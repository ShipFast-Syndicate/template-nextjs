name = "template-nextjs"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# App Router pages output location for @cloudflare/next-on-pages
pages_build_output_dir = ".vercel/output/static"

[env.production]
vars = { DEPLOY_TARGET = "cloudflare" }

# Turso binding for database
[[d1_databases]]
binding = "DB"
database_name = "template-nextjs"
database_id = "your-database-id"